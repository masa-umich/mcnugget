do_noise: false
default_pt_noise_sigma: 10
do_temp_simulation: false
default_tc_noise_sigma: 2
frequency: 50 # Hz
atmosphere_volume_name: "atmosphere"

volumes:
  - name: "copv"
    volume: 31.3 # liters
    initial_pressure: 0 # psi
    channels: ["COPV_PT_1", "COPV_PT_2", "COPV_TC_1", "COPV_TC_2", "COPV_SKIN_TC_1", "COPV_SKIN_TC_2"]
  - name: "bottle 1"
    volume: 42.2
    initial_pressure: 6000
    channels: ["Bottle_1_PT", "Bottle_1_Skin_TC"]
  - name: "bottle 2"
    volume: 42.2
    initial_pressure: 6000
    channels: ["Bottle_2_PT", "Bottle_2_Skin_TC"]
  - name: "bottle 3"
    volume: 42.2
    initial_pressure: 6000
    channels: ["Bottle_3_PT", "Bottle_3_Skin_TC"]
  - name: "bottle 4"
    volume: 42.2
    initial_pressure: 6000
    channels: ["Bottle_4_PT", "Bottle_4_Skin_TC"]
  - name: "press fill manifold"
    volume: 0.1
    initial_pressure: 0
    channels: ["Press_Fill_PT"]

valves:
  - channel: "COPV_Vent" # control channel name or alias
    inlet: "copv" # volume name
    outlet: "atmosphere" # volume name
    flowrate: 0.01 # liters per second at 1 psi pressure differential
    is_check_valve: false # if true, only unidirectional flow from INLET to OUTLET
    is_normally_open: false
  - channel: "Press_Iso_1"
    inlet: "bottle 1"
    outlet: "press fill manifold"
    flowrate: 1
    is_check_valve: false
    is_normally_open: false
  - channel: "Press_Iso_2"
    inlet: "bottle 2"
    outlet: "press fill manifold"
    flowrate: 1
    is_check_valve: false
    is_normally_open: false
  - channel: "Press_Iso_3"
    inlet: "bottle 3"
    outlet: "press fill manifold"
    flowrate: 1
    is_check_valve: false
    is_normally_open: false
  - channel: "Press_Iso_4"
    inlet: "bottle 4"
    outlet: "press fill manifold"
    flowrate: 1
    is_check_valve: false
    is_normally_open: false
  - channel: "Press_Fill_Vent"
    inlet: "press fill manifold"
    outlet: "atmosphere"
    flowrate: 0.01
    is_check_valve: false
    is_normally_open: false
  - channel: "Press_Fill_Iso"
    inlet: "press fill manifold"
    outlet: "copv"
    flowrate: 1
    is_check_valve: false
    is_normally_open: false

    