<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASA Limelight Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Base Setup for OBS 1080p Canvas */
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: transparent; /* Allows cameras to show underneath */
            font-family: 'Montserrat', sans-serif;
            color: #ffffff; /* MASA White */
        }

        /* Top Header Bar */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: #00274c; /* MASA Blue */
            border-bottom: 4px solid #ffcb05; /* MASA Maize Accent */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .masa-logo {
            font-weight: 900;
            font-size: 42px;
            letter-spacing: 2px;
            /* Replace with an img tag using the official MASA Worm logo if desired */
        }

        .mission-name {
            font-weight: 600;
            font-size: 24px;
            color: #eeeeea; /* MASA Sand */
            border-left: 2px solid #ef4624; /* MASA Vermillion */
            padding-left: 20px;
            text-transform: uppercase;
        }

        .timer-section {
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            font-size: 36px;
            color: #ffcb05;
        }

        /* Right Side Telemetry Panel */
        .telemetry-panel {
            position: absolute;
            top: 80px;
            right: 0;
            width: 380px;
            height: 1000px;
            background-color: rgba(0, 39, 76, 0.95); /* Semi-transparent MASA Blue */
            border-left: 4px solid #ef4624; /* Vermillion Accent */
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
        }

        .telemetry-block {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .telemetry-label {
            font-weight: 700; /* Bold for headers */
            font-size: 14px;
            color: #eeeeea;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .telemetry-value {
            font-weight: 500; /* Medium for data */
            font-size: 32px;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
        }

        .status-box {
            background-color: #ef4624;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
            font-weight: 700;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        /* Safe area border to help align cameras in OBS */
        .camera-safe-area {
            position: absolute;
            top: 80px;
            left: 0;
            width: 1540px; /* 1920 - 380 */
            height: 1000px; /* 1080 - 80 */
            box-sizing: border-box;
            border: 2px dashed rgba(255, 203, 5, 0.2); /* Faint Maize guide */
            pointer-events: none; /* Allows clicking through to OBS layers */
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 70, 36, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 70, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 70, 36, 0); }
        }
    </style>
</head>
<body>

    <div class="camera-safe-area"></div>

    <div class="top-bar">
        <div class="brand-section">
            <div class="masa-logo">MASA</div> 
            <div class="mission-name">Limelight Launch</div>
        </div>
        <div class="timer-section" id="t-minus">
            T- 00:15:00
        </div>
    </div>

    <div class="telemetry-panel">
        
        <div class="status-box" id="rocket-state">
            TERMINAL COUNT
        </div>

        <div class="telemetry-block">
            <div class="telemetry-label">Altitude (ft)</div>
            <div class="telemetry-value" id="alt">0</div>
        </div>

        <div class="telemetry-block">
            <div class="telemetry-label">Velocity (Mach)</div>
            <div class="telemetry-value" id="vel">0.00</div>
        </div>

        <div class="telemetry-block">
            <div class="telemetry-label">Propellant Load</div>
            <div class="telemetry-value" id="prop">100%</div>
        </div>
        
        <div class="telemetry-block">
            <div class="telemetry-label">Chamber Press (psi)</div>
            <div class="telemetry-value" id="pressure">NOMINAL</div>
        </div>
    </div>

    <script>
        // Example function showing where you would hook up your ground station data
        function updateTelemetry(state, alt, vel, prop) {
            document.getElementById('rocket-state').innerText = state;
            document.getElementById('alt').innerText = alt.toLocaleString();
            document.getElementById('vel').innerText = vel.toFixed(2);
            document.getElementById('prop').innerText = prop + "%";
        }

        // --- Demo Simulation ---
        // Remove this in production and replace with WebSocket or fetch() polling
        let simAlt = 0;
        setInterval(() => {
            // Simulated fake data jump
            if(document.getElementById('rocket-state').innerText === "IN FLIGHT") {
                simAlt += Math.floor(Math.random() * 500) + 100;
                updateTelemetry("IN FLIGHT", simAlt, 0.85 + (Math.random()*0.1), 85);
            }
        }, 1000);
        // -----------------------
    </script>
</body>
</html>
