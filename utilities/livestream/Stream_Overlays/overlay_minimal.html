<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal MASA Stream Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-color: transparent; 
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
        }

        /* Widened Lower Third */
        .lower-third {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            justify-content: space-between; 
            display: flex;
            align-items: center;
            background: rgba(0, 39, 76, 0.975); /* Highly Translucent MASA Blue */
            backdrop-filter: blur(10px); 
            border-radius: 8px;
            padding: 15px 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
            border-right: 2px solid rgba(238, 238, 234, 0.2);
            margin-right: 40px;
            padding-right: 40px;
            min-width: 250px;
        }

        .masa-logo { height: 45px; width: auto; display: block; }
        .masa-logo-text { font-weight: 900; font-size: 40px; letter-spacing: 2px; color: #ffffff; margin: 0; }
        .mission-name { font-weight: 700; font-size: 22px; color: #eeeeea; text-transform: uppercase; letter-spacing: 3px; white-space: nowrap;}

        /* Container to group the status boxes together */
        .status-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            /*flex-grow: 1; /* Allows it to take up the middle space evenly */
        }

        /* Status Box Base Styles */
        .state-box {
            padding: 12px 25px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        /* Pre-programmed Routine Box */
        .routine-box {
            background-color: #ef4624; /* MASA Vermillion */
            color: #ffffff;
            box-shadow: 0 0 15px rgba(239, 70, 36, 0.4);
        }

        /* Custom Alert Box (Maize to stand out) */
        .custom-box {
            background-color: #ffcb05; /* MASA Maize */
            color: #00274c; /* MASA Blue text for contrast */
            box-shadow: 0 0 15px rgba(255, 203, 5, 0.4);
            display: none; /* Hidden by default until toggled by server */
        }

        .timer {
            font-weight: 700;
            font-size: 34px;
            color: #ffcb05;
            font-variant-numeric: tabular-nums;
            min-width: 200px;
            text-align: right;
        }

        .countdown-overlay {
            background: rgba(100, 39, 76, 0.975); /* Highly Translucent MASA Blue */
            backdrop-filter: blur(10px); 
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            display: none;
            padding: 15px 35px;
            /*margin: 20px 20px;*/
            font-weight: 700;
            font-size: 50px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            /*transition: all 0.3s ease;
            position: absolute;
            top: 0;
            right: 0;*/
        }
    </style>
</head>
<body>
    <div class="countdown-overlay" id="countdown"></div>
    <div class="lower-third">
        <div class="logo-section">
            <img src="masa_logo_transparent.png" alt="MASA" class="masa-logo" onerror="this.outerHTML='<div class=\'masa-logo-text\'>MASA</div>'">
            <div class="mission-name">Limelight Launch</div>
        </div>
        
        <div class="status-container">
            <div class="state-box routine-box" id="routine-state">
                CONNECTING...
            </div>
            
            <div class="state-box custom-box" id="custom-state">
                CUSTOM ALERT
            </div>
        </div>
    </div>

    <script>
        countdownTime = 10;

        function renderCountdown() {
            const countdownBox = document.getElementById('countdown');
            if(countdownTime < 0) {
                countdownBox.textContent = "T" + countdownTime;
            }
            else {
                countdownBox.textContent = "T+" + countdownTime;
            }
        }

        async function fetchSystemState() {
            try {
                const response = await fetch('http://127.0.0.1:5000/api/state');
                const data = await response.json();
                
                // Update Routine Message
                const routineBox = document.getElementById('routine-state');
                if (routineBox.innerText !== data.routine_state) {
                    routineBox.innerText = data.routine_state;
                }

                // Update Custom Message and Handle Visibility
                const customBox = document.getElementById('custom-state');
                if (customBox.innerText !== data.custom_message) {
                    customBox.innerText = data.custom_message;
                }

                const countdownBox = document.getElementById('countdown');
                if(data.countdown) {
                    countdownTime = data.countdownTime;
                    renderCountdown();
                    countdownBox.style.display = "block";
                    customBox.style.display = "none";
                    routineBox.style.display = "none";
                    //document.getElementsByClassName("lower-third").item(0).style.width = "auto";
                    document.getElementsByClassName("logo-section").item(0).style.borderRight = "0px";
                    document.getElementsByClassName("logo-section").item(0).style.paddingRight = "0px";
                    return;
                    
                }
                else {
                    countdownBox.style.display = "none";
                    //document.getElementsByClassName("lower-third").item(0).style.width = "auto";
                    document.getElementsByClassName("logo-section").item(0).style.borderRight = "2px solid rgba(238, 238, 234, 0.2)";
                    document.getElementsByClassName("logo-section").item(0).style.paddingRight = "40px";
                    if (data.show_custom) {
                        customBox.style.display = "block";
                    } else {
                        customBox.style.display = "none";
                    }
                    routineBox.style.display = "block";
                }

            } catch (error) {
                console.error("Waiting for Ground Station Server...");
            }
        }
        
        setInterval(fetchSystemState, 100);
    </script>
</body>
</html>
